[build]
  command = "npm run build"
  publish = "dist"

# Canonicalize .html URLs to clean form (301 to strip .html suffix)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301

# Consolidate standard compression to a single canonical PDP URL.
# The old /collections/compression-socks route was a thin Shopify-backed
# collection page; the standard product now lives at the richer PDP
# /collections/standard-compression. Catches any external or search-engine
# links to the old path.
[[redirects]]
  from = "/collections/compression-socks"
  to = "/collections/standard-compression"
  status = 301

# Pro entry-point consolidation: /pro/resources was a "Coming Soon" placeholder.
# The new canonical Pro hub is /pro/learn. The placeholder file is left on disk
# for potential future reuse (e.g., downloadable PDFs distinct from articles),
# but `force = true` makes this redirect fire before the static file resolves —
# so any inbound link, search-cache hit, or bookmark to /pro/resources lands on
# /pro/learn instead of the obsolete placeholder. Remove the redirect when the
# slug is repurposed with real content.
[[redirects]]
  from = "/pro/resources"
  to = "/pro/learn"
  status = 301
  force = true

# Learn Hub stub-article replacements — fallback to /learn hub.
# The /learn/mobility-aids and /learn/travel-tips stubs were deleted in
# preparation for full-length replacements at richer slugs, but the replacement
# articles (mobility-aids-and-compression-socks, compression-socks-prolonged-sitting)
# are still `published: false` in the registry and have no .astro pages on disk.
# Note: /learn/travel-tips' replacement was re-scoped 2026-05-03 from a travel
# article to a prolonged-sitting article per docs/2026-05-01-launch-plan-amendment-article-7-rescope.md;
# when the replacement ships, swap the `to` field to /learn/compression-socks-prolonged-sitting.
# These 301s preserve any inbound links (bookmarks, search-cache, external
# references) by routing legacy URLs to the Learn Hub.
[[redirects]]
  from = "/learn/mobility-aids"
  to = "/learn"
  status = 301

[[redirects]]
  from = "/learn/travel-tips"
  to = "/learn"
  status = 301

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
